services:
  - type: web
    name: vilaro
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: VILARO_STATE_DIR
        value: /data/.vilaro
      - key: VILARO_WORKSPACE_DIR
        value: /data/workspace
      - key: VILARO_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: vilaro-data
      mountPath: /data
      sizeGB: 1
