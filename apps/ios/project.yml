name: Vilaro
options:
  bundleIdPrefix: ai.vilaro
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_APP_INTENTS_METADATA_GENERATION: NO

packages:
  VilaroKit:
    path: ../shared/VilaroKit
  Swabble:
    path: ../../Swabble

schemes:
  Vilaro:
    shared: true
    build:
      targets:
        Vilaro: all
    test:
      targets:
        - VilaroTests
        - VilaroLogicTests
  VilaroLogicTests:
    shared: true
    build:
      targets:
        VilaroLogicTests: all
    test:
      targets:
        - VilaroLogicTests

targets:
  Vilaro:
    type: application
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Sources
    dependencies:
      - target: VilaroShareExtension
        embed: true
      - target: VilaroActivityWidget
        embed: true
      - target: VilaroWatchApp
      - package: VilaroKit
      - package: VilaroKit
        product: VilaroChatUI
      - package: VilaroKit
        product: VilaroProtocol
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    preBuildScripts:
      - name: SwiftFormat (lint)
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftformat >/dev/null 2>&1; then
            echo "error: swiftformat not found (brew install swiftformat)" >&2
            exit 1
          fi
          swiftformat --lint --config "$SRCROOT/../../.swiftformat" \
            --filelist "$SRCROOT/SwiftSources.input.xcfilelist"
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftlint >/dev/null 2>&1; then
            echo "error: swiftlint not found (brew install swiftlint)" >&2
            exit 1
          fi
          swiftlint lint --config "$SRCROOT/.swiftlint.yml" --use-script-input-file-lists
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_ENTITLEMENTS: Sources/Vilaro.entitlements
        CODE_SIGN_STYLE: "$(VILARO_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(VILARO_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(VILARO_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(VILARO_APP_PROFILE)"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
      configs:
        Debug:
          VILARO_PUSH_TRANSPORT: direct
          VILARO_PUSH_DISTRIBUTION: local
          VILARO_PUSH_RELAY_BASE_URL: ""
          VILARO_PUSH_APNS_ENVIRONMENT: sandbox
        Release:
          VILARO_PUSH_TRANSPORT: direct
          VILARO_PUSH_DISTRIBUTION: local
          VILARO_PUSH_RELAY_BASE_URL: ""
          VILARO_PUSH_APNS_ENVIRONMENT: production
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Vilaro
        CFBundleIconName: AppIcon
        CFBundleURLTypes:
          - CFBundleURLName: ai.vilaro.ios
            CFBundleURLSchemes:
              - vilaro
        CFBundleShortVersionString: "$(VILARO_MARKETING_VERSION)"
        CFBundleVersion: "$(VILARO_BUILD_VERSION)"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
          - remote-notification
        BGTaskSchedulerPermittedIdentifiers:
          - ai.vilaro.ios.bgrefresh
        NSLocalNetworkUsageDescription: Vilaro discovers and connects to your Vilaro gateway on the local network.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsInWebContent: true
        NSBonjourServices:
          - _vilaro-gw._tcp
        NSCameraUsageDescription: Vilaro can capture photos or short video clips when requested via the gateway.
        NSLocationWhenInUseUsageDescription: Vilaro uses your location when you allow location sharing.
        NSLocationAlwaysAndWhenInUseUsageDescription: Vilaro can share your location in the background when you enable Always.
        NSMicrophoneUsageDescription: Vilaro needs microphone access for voice wake.
        NSMotionUsageDescription: Vilaro may use motion data to support device-aware interactions and automations.
        NSPhotoLibraryUsageDescription: Vilaro needs photo library access when you choose existing photos to share with your assistant.
        NSSpeechRecognitionUsageDescription: Vilaro uses on-device speech recognition for voice wake.
        NSSupportsLiveActivities: true
        ITSAppUsesNonExemptEncryption: false
        VilaroPushTransport: "$(VILARO_PUSH_TRANSPORT)"
        VilaroPushDistribution: "$(VILARO_PUSH_DISTRIBUTION)"
        VilaroPushRelayBaseURL: "$(VILARO_PUSH_RELAY_BASE_URL)"
        VilaroPushAPNsEnvironment: "$(VILARO_PUSH_APNS_ENVIRONMENT)"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  VilaroShareExtension:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ShareExtension
    dependencies:
      - package: VilaroKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(VILARO_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(VILARO_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(VILARO_SHARE_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(VILARO_SHARE_PROFILE)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Vilaro Share
        CFBundleShortVersionString: "$(VILARO_MARKETING_VERSION)"
        CFBundleVersion: "$(VILARO_BUILD_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsImageWithMaxCount: 10
              NSExtensionActivationSupportsMovieWithMaxCount: 1

  VilaroActivityWidget:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ActivityWidget
      - path: Sources/LiveActivity/VilaroActivityAttributes.swift
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: ActivityKit.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(VILARO_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(VILARO_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(VILARO_ACTIVITY_WIDGET_BUNDLE_ID)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
    info:
      path: ActivityWidget/Info.plist
      properties:
        CFBundleDisplayName: Vilaro Activity
        CFBundleShortVersionString: "$(VILARO_MARKETING_VERSION)"
        CFBundleVersion: "$(VILARO_BUILD_VERSION)"
        NSSupportsLiveActivities: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  VilaroWatchApp:
    type: application.watchapp2
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchApp
    dependencies:
      - target: VilaroWatchExtension
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(VILARO_WATCH_APP_BUNDLE_ID)"
    info:
      path: WatchApp/Info.plist
      properties:
        CFBundleDisplayName: Vilaro
        CFBundleShortVersionString: "$(VILARO_MARKETING_VERSION)"
        CFBundleVersion: "$(VILARO_BUILD_VERSION)"
        WKCompanionAppBundleIdentifier: "$(VILARO_APP_BUNDLE_ID)"
        WKWatchKitApp: true

  VilaroWatchExtension:
    type: watchkit2-extension
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchExtension/Sources
    dependencies:
      - sdk: AppIntents.framework
      - sdk: WatchConnectivity.framework
      - sdk: UserNotifications.framework
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "$(VILARO_WATCH_EXTENSION_BUNDLE_ID)"
    info:
      path: WatchExtension/Info.plist
      properties:
        CFBundleDisplayName: Vilaro
        CFBundleShortVersionString: "$(VILARO_MARKETING_VERSION)"
        CFBundleVersion: "$(VILARO_BUILD_VERSION)"
        NSExtension:
          NSExtensionAttributes:
            WKAppBundleIdentifier: "$(VILARO_WATCH_APP_BUNDLE_ID)"
          NSExtensionPointIdentifier: com.apple.watchkit

  VilaroTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests
        excludes:
          - Logic
    dependencies:
      - target: Vilaro
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(VILARO_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(VILARO_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.vilaro.ios.tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Vilaro.app/Vilaro"
        BUNDLE_LOADER: "$(TEST_HOST)"
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: VilaroTests
        CFBundleShortVersionString: "$(VILARO_MARKETING_VERSION)"
        CFBundleVersion: "$(VILARO_BUILD_VERSION)"

  VilaroLogicTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests/Logic
    dependencies:
      - package: VilaroKit
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(VILARO_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(VILARO_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.vilaro.ios.logic-tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: VilaroLogicTests
        CFBundleShortVersionString: "$(VILARO_MARKETING_VERSION)"
        CFBundleVersion: "$(VILARO_BUILD_VERSION)"
